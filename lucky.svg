<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="image-rendering: pixelated;">
  <!-- Lucky - Grey Lhasa Apso-Poodle mix pixel art -->

  <!-- Back legs -->
  <rect x="8" y="36" width="6" height="10" fill="#6b6b6b"/>
  <rect x="10" y="44" width="4" height="2" fill="#4a4a4a"/>
  <rect x="28" y="36" width="6" height="10" fill="#7a7a7a"/>
  <rect x="30" y="44" width="4" height="2" fill="#4a4a4a"/>

  <!-- Fluffy tail (curled up like a Lhasa Apso) -->
  <rect x="2" y="22" width="6" height="8" fill="#9e9e9e"/>
  <rect x="4" y="18" width="6" height="6" fill="#b0b0b0"/>
  <rect x="6" y="16" width="4" height="4" fill="#c0c0c0"/>

  <!-- Body (fluffy, rounded) -->
  <rect x="8" y="24" width="32" height="14" fill="#8a8a8a"/>
  <rect x="10" y="22" width="28" height="4" fill="#9e9e9e"/>
  <rect x="12" y="20" width="24" height="4" fill="#a8a8a8"/>

  <!-- Chest fluff -->
  <rect x="34" y="28" width="6" height="8" fill="#b8b8b8"/>
  <rect x="36" y="26" width="4" height="4" fill="#c8c8c8"/>

  <!-- Head -->
  <rect x="32" y="10" width="14" height="14" fill="#9e9e9e"/>
  <rect x="34" y="8" width="10" height="4" fill="#a8a8a8"/>
  <rect x="36" y="6" width="6" height="4" fill="#b0b0b0"/>

  <!-- Floppy ears (Lhasa Apso style) -->
  <rect x="30" y="10" width="4" height="12" fill="#7a7a7a"/>
  <rect x="28" y="14" width="4" height="10" fill="#6b6b6b"/>
  <rect x="44" y="10" width="4" height="12" fill="#7a7a7a"/>

  <!-- Snout -->
  <rect x="42" y="16" width="6" height="6" fill="#b8b8b8"/>
  <rect x="44" y="18" width="4" height="3" fill="#c8c8c8"/>

  <!-- Nose -->
  <rect x="46" y="18" width="2" height="2" fill="#2a2a2a"/>

  <!-- Eyes (sweet old dog eyes) -->
  <rect x="38" y="12" width="3" height="3" fill="#f5f5f5"/>
  <rect x="39" y="13" width="2" height="2" fill="#3a3a3a"/>

  <!-- Tongue (happy pup!) -->
  <rect x="44" y="22" width="3" height="4" fill="#ff9999"/>

  <!-- Top head fluff (poodle style) -->
  <rect x="34" y="4" width="8" height="4" fill="#c0c0c0"/>
  <rect x="36" y="2" width="4" height="4" fill="#d0d0d0"/>
</svg>
